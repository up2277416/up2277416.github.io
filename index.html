    <title>Isaac Olajide | Network Infrastructure Portfolio</title>

            --bg: #0d1117; 
            --text: #c9d1d9;

            line-height: 1.6; 
            margin: 0; 
            padding: 20px;

            border-radius: 5px; 
            font-size: 0.8rem; 
            font-weight: bold; 
        }
        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
        }

            width: 100%; 
            border-collapse: collapse;

        }
        th, td {

            padding: 10px; 
            text-align: left; 
        }
        th { background: #21262d; }
